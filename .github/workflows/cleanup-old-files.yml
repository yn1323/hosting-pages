name: Cleanup old CI result files

on:
  schedule:
    # 03:10 JST every day.
    - cron: "10 18 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "List files that would be deleted without committing changes"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: cleanup-old-files
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Delete tracked files older than 30 days
        id: cleanup
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          RETENTION_DAYS: "30"
        shell: bash
        run: |
          set -euo pipefail

          cutoff="$(date -u -d "$RETENTION_DAYS days ago" +%Y-%m-%dT%H:%M:%SZ)"
          recent_files="$(mktemp)"
          deleted_count=0

          git fetch --no-tags --prune --shallow-since="$cutoff" origin main

          git log --since="$cutoff" --name-only --pretty=format: |
            sed '/^$/d' |
            sort -u > "$recent_files"

          while IFS= read -r -d '' file; do
            case "$file" in
              README.md|.github/*|*.gitkeep)
                continue
                ;;
            esac

            if ! grep -Fxq -- "$file" "$recent_files"; then
              echo "old file: $file"
              if [[ "$DRY_RUN" != "true" ]]; then
                rm -f -- "$file"
              fi
              deleted_count=$((deleted_count + 1))
            fi
          done < <(git ls-files -z)

          echo "deleted_count=$deleted_count" >> "$GITHUB_OUTPUT"

          if [[ "$DRY_RUN" == "true" ]]; then
            echo "Dry run complete. $deleted_count file(s) would be deleted."
          else
            echo "Cleanup complete. $deleted_count file(s) deleted."
          fi

      - name: Commit and push cleanup
        if: ${{ github.event.inputs.dry_run != 'true' }}
        shell: bash
        run: |
          set -euo pipefail

          git add -A
          if git diff --cached --quiet; then
            echo "No old files to remove."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git commit -m "chore: remove old CI result files"
          git push origin HEAD:main
