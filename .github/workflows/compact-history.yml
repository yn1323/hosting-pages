name: Compact Git history

on:
  schedule:
    # 03:30 JST every day, after cleanup-old-files.
    - cron: "30 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: compact-history
  cancel-in-progress: false

jobs:
  compact:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Recreate main with current files only
        shell: bash
        run: |
          set -euo pipefail

          old_sha="$(git rev-parse HEAD)"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git switch --orphan compact-main
          git add -A
          git commit -m "chore: compact repository history"

          git push --force-with-lease=main:"$old_sha" origin compact-main:main
